# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    morfeditorial\services\:
        resource: '../vendor/morfeditorial/machinima-bot/src/services/'
        public: true
        exclude: '../vendor/morfeditorial/machinima-bot/src/services/ContentItem.php'
        bind:
            $workflow: '@state_machine.content_publishing'

    morfeditorial\screens\:
        resource: '../vendor/morfeditorial/machinima-bot/src/screens/'
        public: true

    morfeditorial\commands\:
        resource: '../vendor/morfeditorial/machinima-bot/src/commands/'
        public: true

    morfeditorial\Translator:
        public: true

    Symfony\Component\DependencyInjection\ContainerInterface: '@service_container'
    
    bot_translator:
        alias: morfeditorial\Translator
        public: true

    role_service:
        alias: morfeditorial\services\RoleService
        public: true

    user_service:
        alias: morfeditorial\services\UserService
        public: true

    user_state_service:
        alias: morfeditorial\services\UserStateService
        public: true

    author_service:
        alias: morfeditorial\services\AuthorService
        public: true

    content_service:
        alias: morfeditorial\services\ContentService
        public: true

    notification_service:
        alias: morfeditorial\services\NotificationService
        public: true

    rating_service:
        alias: morfeditorial\services\RatingService
        public: true

    token_storage:
        alias: security.token_storage
        public: true

    authorization_checker:
        alias: security.authorization_checker
        public: true

    visuals_links:
        class: ArrayObject
        arguments:
            - [
                'https://i.ibb.co/mC7sv0W/01.png',
                'https://i.ibb.co/ygqgFMV/02.png',
                'https://i.ibb.co/1KysC55/03.png',
                'https://i.ibb.co/64vFVfS/04.png',
                'https://i.ibb.co/TLDzmVf/05.png',
                'https://i.ibb.co/85LB6PW/06.png',
                'https://i.ibb.co/fDbmdMM/07.png',
                'https://i.ibb.co/tqMNGtX/08.png',
                'https://i.ibb.co/xF1QQXk/09.png',
                'https://i.ibb.co/LPYBSBX/10.png',
                'https://i.ibb.co/Fn2HJJQ/11.png',
                'https://i.ibb.co/TYPWsLQ/12.png'
              ]
        public: true

    Morfeditorial\TelegramBotBundle\Routing\UpdateDispatcher:
        arguments:
            $commands: !tagged_iterator telegram_bot.command
            $screens: !tagged_iterator telegram_bot.screen

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

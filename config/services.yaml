# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $workflow: '@state_machine.content_publishing'
            $projectDir: '%kernel.project_dir%'

    Morfeditorial\MachinimaCoreBundle\Contract\NotificationChannelPort:
        alias: Morfeditorial\MachinimaCoreBundle\Contract\Notification\NullNotificationChannel
        public: true

    Morfeditorial\MachinimaCoreBundle\Service\Notification\NotificationGateway:
        arguments:
            $channel: '@Morfeditorial\MachinimaCoreBundle\Contract\NotificationChannelPort'

    Morfeditorial\MachinimaCoreBundle\Service\IdentityProviderRegistry:
        arguments:
            $providers: !tagged_iterator app.identity_provider

    Morfeditorial\MachinimaCoreBundle\Service\PlatformAdapterRegistry:
        arguments:
            $adapters: !tagged_iterator app.platform_adapter

    Morfeditorial\MachinimaCoreBundle\Service\Avatar\AvatarProviderInterface:
        alias: Morfeditorial\MachinimaCoreBundle\Service\Avatar\ThumbsAvatarProvider

    Morfeditorial\MachinimaCoreBundle\Service\Avatar\ThumbsAvatarProvider:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Morfeditorial\MachinimaCoreBundle\Service\Avatar\InitialsAvatarProvider:
        arguments:
            $projectDir: '%kernel.project_dir%'

    Morfeditorial\MachinimaCoreBundle\Service\Media\MediaProviderInterface:
        alias: Morfeditorial\MachinimaCoreBundle\Service\Media\DefaultMediaProvider

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    Morfeditorial\MachinimaCoreBundle\:
        resource: '../src/'
        exclude:
            - '../src/Entity/'
            - '../src/Service/IdentityProviderRegistry.php'
            - '../src/Service/PlatformAdapterRegistry.php'

    Symfony\Component\DependencyInjection\ContainerInterface: '@service_container'

    role_service:
        alias: Morfeditorial\MachinimaCoreBundle\Service\RoleService
        public: true

    content_service:
        alias: Morfeditorial\MachinimaCoreBundle\Service\ContentService
        public: true

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
